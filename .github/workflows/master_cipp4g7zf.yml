name: Build and deploy Powershell project to Azure Function App - cipp4g7zf

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: 'Zip the project'
        run: zip -r release.zip . -x "*.git*" -x ".github/*"

      - name: 'Deploy to Azure Function App'
        uses: Azure/functions-action@v1
        with:
          app-name: 'cipp4g7zf'
          slot-name: 'Production'
          package: 'release.zip'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_79AA7FC13E9F414DBC353215DF1EE7D0 }}
